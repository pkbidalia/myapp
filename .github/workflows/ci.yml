name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 21

      - name: Install dependencies
        run: npm install eslint jest

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build project
        run: npm run build

      - name: Test Coverage
        run: npm test -- --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
            name: coverage-report
            path: coverage/

      - name: Build Docker image
        run: docker build -t my-app:${{ github.sha }} .

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        #run: echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u pktata07 --password-stdin

      - name: Push image
        run: |
          docker tag my-app:${{ github.sha }} ghcr.io/pktata07/my-app:${{ github.sha }}
          docker push ghcr.io/pktata07/my-app:${{ github.sha }}

